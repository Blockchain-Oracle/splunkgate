[mypy]
python_version = 3.13
explicit_package_bases = True
namespace_packages = True
strict = False
plugins = pydantic.mypy

# splunkgate_core + splunkgate_judges: mypy --strict per architecture.md Hard Rule 2.
# NOTE: `disallow_any_explicit` was considered but DROPPED — it fires on every
# pydantic BaseModel subclass declaration (pydantic's parent class inherits
# Any-using methods from typing internals). The intent of CLAUDE.md's "No Any
# in splunkgate_core or splunkgate_judges" is enforced by code review + the
# explicit rule list in CLAUDE.md hard rule 5, not by this flag.
[mypy-splunkgate_core.*]
strict = True

[mypy-splunkgate_judges.*]
strict = True

# Third-party libraries without py.typed markers.
# splunklib.ai (splunk-sdk 3.0.0) has no type stubs as of 2026-06-03.
[mypy-splunklib.*]
ignore_missing_imports = True
