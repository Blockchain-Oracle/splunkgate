[mypy]
python_version = 3.13
explicit_package_bases = True
namespace_packages = True
strict = False
plugins = pydantic.mypy

# aegis_core: mypy --strict per architecture.md Hard Rule 2.
# NOTE: `disallow_any_explicit` was considered but DROPPED — it fires on every
# pydantic BaseModel subclass declaration (pydantic's parent class inherits
# Any-using methods from typing internals). The intent of CLAUDE.md's "No Any
# in aegis_core or aegis_judges" is enforced by code review + the explicit
# rule list in CLAUDE.md hard rule 5, not by this flag.
[mypy-aegis_core.*]
strict = True

[mypy-aegis_judges.*]
strict = True
