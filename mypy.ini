[mypy]
python_version = 3.13
explicit_package_bases = True
namespace_packages = True
strict = False

# aegis_core: mypy --strict + disallow_any_explicit per architecture.md
# Hard Rule 2 + "No `Any` in aegis_core or aegis_judges" ban.
[mypy-aegis_core.*]
strict = True
disallow_any_explicit = True

[mypy-aegis_judges.*]
strict = True
disallow_any_explicit = True
