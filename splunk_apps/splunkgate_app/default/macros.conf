######################################
###         Utility Macros         ###
######################################
#
# SplunkGate mirrors DNS Guard AI's 1st-place-AI/ML 2025 winning shape: 8
# macros total (3 utility + 5 ML), pure SPL + MLTK, no Python in the app
# dir, no LLM calls. The threat domain swaps from DNS anomaly to agent
# verdict; the MLTK triad (`fit DensityFunction` + `fit KMeans k=2` +
# `anomalydetection`) is preserved verbatim per
# context/11-prior-art/01-build-a-thon-2025-deep-read.md.
#
# A future story could add an splunkgate_verdict CIM datamodel; for v1 the
# `splunkgate_data` macro is a flat sourcetype search (DNS Guard uses
# `datamodel Network_Resolution` because the CIM model exists for DNS).

[splunkgate_data]
# Explicit `index=*` so dashboards (which often run under the `nobody`
# user that may not have any indexes set as defaults) actually surface
# results. Production deployments should narrow this to whichever
# index Aegis verdicts land in (typically `main`); kept wide for the
# demo + multi-index ops setups.
definition = search index=* sourcetype=cisco_ai_defense:splunkgate_verdict
iseval = 0

[splunkgate_extract_rule]
definition = mvexpand rule
iseval = 0

[update_verdict_history]
definition = outputlookup append=true splunkgate_verdict_history_lookup
iseval = 0


######################################
###  Verdict Trend Forecasting     ###
###  (fit DensityFunction)         ###
######################################
#
# Density-based anomaly detection on per-agent verdict-volume time series.
# Cold-start: fit once on baseline window. Steady-state: partial_fit=true
# on every cron run to keep the model current.

[setup_verdict_trend_forecast]
definition = `splunkgate_data` | bin _time span=1h | stats count as verdict_count by _time agent_id | fit DensityFunction verdict_count by "agent_id" dist=norm threshold=0.01 into splunkgate_verdict_trend_model
iseval = 0

[train_verdict_trend_forecast]
definition = `splunkgate_data` | bin _time span=1h | stats count as verdict_count by _time agent_id | fit DensityFunction verdict_count by "agent_id" into splunkgate_verdict_trend_model partial_fit=true
iseval = 0


######################################
###   Verdict Burst Detection      ###
###   (anomalydetection)           ###
######################################
#
# Statistical AD on 5-minute verdict-count windows per agent — catches
# sudden bursts (e.g., an agent loop calling AI Defense 1000×/minute).
# Annotates the upstream search with `probable_cause` and persists hits
# to the KV-store via the update_verdict_history utility macro.

[ad_verdict_burst_detection]
definition = `splunkgate_data` | bin _time span=5m | stats count as verdict_count by _time agent_id | anomalydetection "agent_id" "verdict_count" action=annotate | eval isOutlier = if(probable_cause != "", "1", "0") | where isOutlier=1 | eval last_update = now(), anomaly_type = "Verdict Burst", _key = agent_id ."#". anomaly_type | table _key, last_update, agent_id, anomaly_type | `update_verdict_history`
iseval = 0


######################################
### Agent Behavioral Clustering    ###
### (fit KMeans k=2)               ###
######################################
#
# Two-cluster unsupervised split: "safe" vs "high-risk" agents on 4
# behavioral features:
#   avg_latency_ms        — middleware compute latency per agent
#   verdict_rate_per_hour — agent volume normalized
#   block_ratio           — BLOCK count / total verdict count
#   severity_score_avg    — mean of the EVAL'd severity_score
#                           (NONE=0 LOW=0.33 MED=0.66 HIGH=1.0)
# DNS Guard uses 9 features for src clustering; SplunkGate uses 4 because
# the verdict surface is more constrained.

[setup_agent_behavioral_clustering]
definition = `splunkgate_data` | bin _time span=1h | eventstats count as hourly_verdicts by _time, agent_id | stats avg(latency_ms) as avg_latency_ms, avg(hourly_verdicts) as verdict_rate_per_hour, count(eval(verdict_label="block")) as blocks, count as total, avg(severity_score) as severity_score_avg by agent_id | eval block_ratio = round(blocks/total, 4) | fillnull value=0 avg_latency_ms verdict_rate_per_hour block_ratio severity_score_avg | fields agent_id avg_latency_ms verdict_rate_per_hour block_ratio severity_score_avg | fit KMeans "avg_latency_ms" "verdict_rate_per_hour" "block_ratio" "severity_score_avg" k=2 into splunkgate_agent_behavior_clusters
iseval = 0

[train_agent_behavioral_clustering]
definition = `splunkgate_data` | bin _time span=1h | eventstats count as hourly_verdicts by _time, agent_id | stats avg(latency_ms) as avg_latency_ms, avg(hourly_verdicts) as verdict_rate_per_hour, count(eval(verdict_label="block")) as blocks, count as total, avg(severity_score) as severity_score_avg by agent_id | eval block_ratio = round(blocks/total, 4) | fillnull value=0 avg_latency_ms verdict_rate_per_hour block_ratio severity_score_avg | fields agent_id avg_latency_ms verdict_rate_per_hour block_ratio severity_score_avg | fit KMeans "avg_latency_ms" "verdict_rate_per_hour" "block_ratio" "severity_score_avg" k=2 into splunkgate_agent_behavior_clusters partial_fit=true
iseval = 0
