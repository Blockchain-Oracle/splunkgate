######################################
###          SplunkGate tags              ###
######################################
#
# CIM-style tag bindings. The `cisco_ai_defense_family` tag lets SOC
# analysts run unified searches across the Cisco Security Cloud app's
# `cisco_ai_defense:*` sourcetype family plus SplunkGate verdicts in one go:
#   `tag=cisco_ai_defense_family severity=HIGH`

[eventtype=splunkgate_verdict_all]
splunkgate = enabled
ai_safety = enabled
cisco_ai_defense_family = enabled

[eventtype=splunkgate_verdict_block]
blocked = enabled

[eventtype=splunkgate_verdict_high_severity]
critical = enabled
