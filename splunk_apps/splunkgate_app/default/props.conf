######################################
###  cisco_ai_defense:splunkgate_verdict   ###
######################################
#
# Per ADR-005 in docs/architecture.md, every SplunkGate Verdict is emitted as a
# `gen_ai.evaluation.result` OTel span event and shipped to Splunk HEC under
# this sourcetype. The sourcetype colocates with Cisco Security Cloud
# (Splunkbase app 7404, 55K+ installs) so SOC analysts can run unified
# searches across both products.
#
# JSON-ingest configuration mirrors DNS Guard AI's `synthetic-data` stanza
# (Splunkbase 7922, 1st-place AI/ML 2025 winner) — see
# context/11-prior-art/01-build-a-thon-2025-deep-read.md.

[cisco_ai_defense:splunkgate_verdict]
DATETIME_CONFIG =
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
TIMESTAMP_FIELDS = timestamp
category = Structured
pulldown_type = true
disabled = false

# ─── Flat field aliases for OTel dotted attributes ────────────────────────
# The HEC payload carries OTel attribute keys like `gen_ai.evaluation.score.label`.
# Splunk's JSON ingest preserves the dots in field names; dashboards and
# saved searches consume flat field names. The single-quoted source paths
# are Splunk's escape syntax for dotted field references.

# EVAL aliases instead of FIELDALIAS: Splunk's FIELDALIAS rule has a known
# regression when the source field name contains dots AND the event came in
# via INDEXED_EXTRACTIONS=json (dotted JSON paths become flat field names
# but FIELDALIAS doesn't always read them). EVAL with single-quoted dotted
# source paths reliably resolves the value at search-time.
EVAL-verdict_label = 'gen_ai.evaluation.score.label'
EVAL-evaluation_name = 'gen_ai.evaluation.name'
EVAL-explanation = 'gen_ai.evaluation.explanation'
EVAL-surface = 'splunkgate.surface'
EVAL-trace_id = 'splunkgate.trace_id'
EVAL-rule = 'splunkgate.rules'
EVAL-agent_id = 'splunkgate.agent_id'
EVAL-mcp_method_name = 'mcp.method.name'
EVAL-mcp_session_id = 'mcp.session.id'

# ─── Computed (EVAL) fields ───────────────────────────────────────────────
# Lift the numeric severity score onto a flat name + derive the string
# severity label from the score for sort/RBA use. Per splunkgate_core/otel.py:
#   NONE_SEVERITY=0.0  LOW=0.33  MEDIUM=0.66  HIGH=1.0

# Splunk processes EVAL-X rules in alphabetical order by `X`. Because
# `severity` sorts before `severity_score`, `EVAL-severity` would compute
# from an empty `severity_score`. We sidestep the ordering by reading the
# OTel source attribute directly in the case expression — search-time only.
EVAL-severity_score = 'gen_ai.evaluation.score.value'
EVAL-severity = case('gen_ai.evaluation.score.value'>=1.0, "HIGH", 'gen_ai.evaluation.score.value'>=0.66, "MEDIUM", 'gen_ai.evaluation.score.value'>=0.33, "LOW", true(), "NONE_SEVERITY")
# z_ prefix forces these two to run AFTER `EVAL-verdict_label` (which
# itself runs alphabetically before `verdict_label_upper`/`is_blocked`).
EVAL-z_verdict_label_upper = upper(verdict_label)
EVAL-z_is_blocked = if(lower(verdict_label)="block", 1, 0)
