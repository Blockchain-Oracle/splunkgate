######################################
###  cisco_ai_defense:splunkgate_verdict   ###
######################################
#
# Per ADR-005 in docs/architecture.md, every SplunkGate Verdict is emitted as a
# `gen_ai.evaluation.result` OTel span event and shipped to Splunk HEC under
# this sourcetype. The sourcetype colocates with Cisco Security Cloud
# (Splunkbase app 7404, 55K+ installs) so SOC analysts can run unified
# searches across both products.
#
# JSON-ingest configuration mirrors DNS Guard AI's `synthetic-data` stanza
# (Splunkbase 7922, 1st-place AI/ML 2025 winner) — see
# context/11-prior-art/01-build-a-thon-2025-deep-read.md.

[cisco_ai_defense:splunkgate_verdict]
# DATETIME_CONFIG = CURRENT: Splunk uses HEC receive-time as `_time`. The
# Verdict's payload `timestamp` field is kept for forensic correlation but
# not used as the index-time anchor — production verdicts arrive at HEC
# within milliseconds of creation (receive ≈ verdict time), and the
# synthetic emitter (story-app-13) uses a deterministic future anchor for
# vision-loop byte-stable output that would otherwise put events out of
# any `last 24h` window. Receive-time normalisation keeps both production
# and demo dashboards honest.
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = json
KV_MODE = none
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Structured
pulldown_type = true
disabled = false

# ─── Flat field aliases for OTel dotted attributes ────────────────────────
# The HEC payload carries OTel attribute keys like `gen_ai.evaluation.score.label`.
# Splunk's JSON ingest preserves the dots in field names; dashboards and
# saved searches consume flat field names. The single-quoted source paths
# are Splunk's escape syntax for dotted field references.

FIELDALIAS-verdict_label = 'gen_ai.evaluation.score.label' AS verdict_label
FIELDALIAS-evaluation_name = 'gen_ai.evaluation.name' AS evaluation_name
FIELDALIAS-explanation = 'gen_ai.evaluation.explanation' AS explanation
FIELDALIAS-surface = 'splunkgate.surface' AS surface
FIELDALIAS-trace_id = 'splunkgate.trace_id' AS trace_id
FIELDALIAS-rule = 'splunkgate.rules{}' AS rule
FIELDALIAS-agent_id = 'splunkgate.agent_id' AS agent_id
FIELDALIAS-mcp_method_name = 'mcp.method.name' AS mcp_method_name
FIELDALIAS-mcp_session_id = 'mcp.session.id' AS mcp_session_id

# ─── Computed (EVAL) fields ───────────────────────────────────────────────
# Lift the numeric severity score onto a flat name + derive the string
# severity label from the score for sort/RBA use. Per splunkgate_core/otel.py:
#   NONE_SEVERITY=0.0  LOW=0.33  MEDIUM=0.66  HIGH=1.0

EVAL-severity_score = 'gen_ai.evaluation.score.value'
EVAL-severity = case(severity_score>=1.0, "HIGH", severity_score>=0.66, "MEDIUM", severity_score>=0.33, "LOW", true(), "NONE_SEVERITY")
EVAL-verdict_label_upper = upper(verdict_label)
EVAL-is_blocked = if(verdict_label="block", 1, 0)
