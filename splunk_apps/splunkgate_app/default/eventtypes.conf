######################################
###      SplunkGate eventtypes            ###
######################################
#
# Sourcetype-anchored (not index-anchored) so the same eventtypes work
# whether the deployment routes SplunkGate events to `main`, to a dedicated
# `splunkgate` index, or to a shared `cisco_ai_defense` index.

[splunkgate_verdict_all]
search = sourcetype="cisco_ai_defense:splunkgate_verdict"
#tags = splunkgate ai_safety cisco_ai_defense_family
description = Every SplunkGate verdict event (ALLOW / MODIFY / BLOCK / REVIEW).

[splunkgate_verdict_block]
# verdict_label is lowercase per splunkgate_core/otel.py emitting
# verdict.verdict.value.lower(). Matching BLOCK uppercase silently
# returns zero events. Fixed in PR #93 after pr-review caught it on
# PRs #87-91 retroactive review.
search = sourcetype="cisco_ai_defense:splunkgate_verdict" verdict_label=block
#tags = blocked
description = SplunkGate verdicts that blocked an agent action or model invocation.

[splunkgate_verdict_high_severity]
# severity is derived in props.conf:43 via EVAL-severity case statement
# from the numeric gen_ai.evaluation.score.value; the case returns
# uppercase strings ("HIGH"/"MEDIUM"/"LOW"/"NONE_SEVERITY") so this
# stanza correctly matches HIGH uppercase.
search = sourcetype="cisco_ai_defense:splunkgate_verdict" severity=HIGH
#tags = critical
description = SplunkGate verdicts at HIGH severity (PCI HIGH, Prompt Injection HIGH, etc.).
