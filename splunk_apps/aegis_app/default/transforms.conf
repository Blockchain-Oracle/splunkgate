######################################
###     Aegis transforms             ###
######################################
#
# Forward-compat named transforms referenced from props.conf only when
# JSON-mode auto-extraction is insufficient. v1 props.conf does all the
# field lifting via FIELDALIAS/EVAL; these named stanzas exist so future
# stories (story-app-08 ES RBA, story-app-14 MITRE ATLAS lookup) can
# reference them by name without rewriting props.conf.

# Multi-value rule field expansion. The OTel event ships `aegis.rules` as
# a JSON array; Splunk's JSON ingest creates `aegis.rules{}` as a
# multi-value field. The props.conf FIELDALIAS-rule aliases it to `rule`.
# Downstream dashboards use `| mvexpand rule` for per-rule analytics.
# This stanza is a placeholder so future rule-aware transforms attach here.

[aegis_rules_mv]
SOURCE_KEY = field:rule
REGEX = (?<rule>.+)
MV_ADD = true

# Numeric severity score mapping. props.conf does the runtime mapping via
# the EVAL-severity stanza; this transform stub is kept so story-app-08's
# ES Risk-Based Alerting can do an explicit `lookup aegis_severity_score`
# call if a future story moves to lookup-driven scoring. SOURCE_KEY +
# REGEX form is the canonical Splunk no-op transform shape.

[aegis_severity_score]
SOURCE_KEY = field:severity_score
REGEX = (?<severity_score>.+)

# ─── KV-store lookup definitions (story-app-04) ───────────────────────────
# Each stanza wires a KV-store collection (defined in collections.conf) so
# SPL can call `| lookup aegis_*_lookup …` or `| inputlookup aegis_*_lookup`.

[aegis_verdict_history_lookup]
external_type = kvstore
collection = aegis_verdict_history
fields_list = _key, _user, last_update, trace_id, timestamp, agent_id, surface, verdict_label, severity, severity_score, rules, classifications, explanation, latency_ms, jurisdictional_tag, retention_until

[aegis_profile_index_lookup]
external_type = kvstore
collection = aegis_profile_index
fields_list = _key, jurisdictional_tag, retention_years, applicable_regs

# ─── MITRE ATLAS technique-ID mapping (story-app-14, per ADR-013) ─────────
# CSV lookup: every Cisco AI Defense rule name → MITRE ATLAS technique +
# tactic IDs. Lets SOC analysts pivot from an Aegis verdict to the
# corresponding ATLAS technique in their existing AI threat-detection
# workflows (e.g., MITRE ATLAS AI Threat Detection app, Splunkbase 8527).
#
# Per pr-review I2: the PHI row in the CSV is FORWARD-COMPAT. Cisco AI
# Defense currently emits PII with entity_types: ["MEDICAL_RECORD_NUMBER",
# ...] for HIPAA-relevant fields rather than a discrete PHI rule_name.
# The PHI row matches if/when Cisco extends the rule taxonomy to include
# PHI as a first-class rule. Leaving it in v1 lookup keeps the eventual
# upgrade a zero-change op for the Splunk app.

[atlas_technique_mapping]
filename = atlas_technique_mapping.csv
case_sensitive_match = true
