######################################
###      Aegis saved searches      ###
######################################
#
# Three groups:
#   1. Dashboard-driving searches  (enabled, on-demand)
#   2. Correlation alert            (enabled, scheduled, feeds ES RBA)
#   3. Bootstrap + ML pipeline      (disabled by default — user opts in
#                                    after MLTK app is installed)
#
# Cron schedule `15 */6 * * *` mirrors DNS Guard's exact value: every 6
# hours at minute 15. Avoids the top-of-hour stampede that hits Splunk
# Cloud's saved-search scheduler quotas.


######################################
###  1. Dashboard-driving searches ###
######################################

[Aegis - All Verdicts 24h]
search = `aegis_data` earliest=-24h | stats count by verdict_label
disabled = 0
description = Headline counter for dashboard 1 (Agent Risk Overview).

[Aegis - HIGH severity by agent]
search = `aegis_data` severity=HIGH earliest=-24h | stats count by agent_id | sort -count
disabled = 0
description = Top-N agents by HIGH-severity verdict count (dashboard 1 right panel).

[Aegis - MSJ scaling indicator]
search = `aegis_data` earliest=-7d | stats count(eval(severity!="NONE_SEVERITY")) as detections count as total_msgs by agent_id | eval detection_rate = round(detections/total_msgs, 4) | sort -total_msgs
disabled = 0
description = Many-Shot Jailbreaking scaling indicator per Anthropic's MSJ finding (context/01-threat-landscape/02-jailbreak-techniques.md). Surfaces how detection_rate trends as agent context length grows; keeps the dashboard honest about the probabilistic ceiling.


######################################
###  2. ES correlation alert       ###
######################################

[Aegis - HIGH severity correlation alert]
search = `aegis_data` severity=HIGH verdict_label=block | stats count by agent_id trace_id rule
cron_schedule = */15 * * * *
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
enableSched = 1
disabled = 0
action.risk = 1
action.notable = 1
action.notable.param.rule_title = Aegis: HIGH-severity agent BLOCK
action.notable.param.rule_description = An Aegis-instrumented agent had at least one HIGH-severity BLOCK in the last 15 minutes. Drill into trace_id for full provenance.
action.notable.param.severity = high
description = Generates an ES notable event per HIGH-severity BLOCK verdict. Risk factors that map this to specific risk identifiers land in story-app-08's risk_factors.conf.


######################################
###  3. Bootstrap + ML pipeline    ###
###     (disabled by default)       ###
######################################

[Aegis - Bootstrap profile index]
search = | inputlookup aegis_profile_seed.csv | eval _key = jurisdictional_tag | outputlookup aegis_profile_index_lookup
is_scheduled = 1
cron_schedule = @daily
dispatch.earliest_time = 0
dispatch.latest_time = now
disabled = 1
description = One-shot saved search that seeds the aegis_profile_index KV-store collection (story-app-04) from lookups/aegis_profile_seed.csv. User enables once after install; running on @daily makes it idempotent if anyone toggles it on permanently.

[Aegis - Setup Model - Verdict Trend Forecast]
search = `setup_verdict_trend_forecast`
cron_schedule = 15 */6 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = One-shot cold-start fit of the DensityFunction model on 7 days of verdict-volume baseline. Enable once after installing MLTK + emitting at least 7 days of verdicts.

[Aegis - Train Model - Verdict Trend Forecast]
search = `train_verdict_trend_forecast`
cron_schedule = 15 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = Incremental partial_fit retrain every 6 hours. Keeps the DensityFunction model current without expensive full retrains.

[Aegis - Setup Model - Agent Behavioral Clustering]
search = `setup_agent_behavioral_clustering`
cron_schedule = 15 */6 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = One-shot cold-start fit of the KMeans k=2 cluster model splitting agents into safe vs high-risk.

[Aegis - Train Model - Agent Behavioral Clustering]
search = `train_agent_behavioral_clustering`
cron_schedule = 15 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = Incremental partial_fit retrain of the KMeans cluster model every 6 hours.

[Aegis - Anomaly Detection - Verdict Burst]
search = `ad_verdict_burst_detection`
cron_schedule = 15 */6 * * *
dispatch.earliest_time = -6h
dispatch.latest_time = now
enableSched = 1
disabled = 1
description = Statistical anomaly detection on 5-minute verdict-rate windows per agent. Persists hits to aegis_verdict_history via the update_verdict_history utility macro.
