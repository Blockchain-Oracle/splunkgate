#######################################
### Risk Factors for ES Integration ###
#######################################
#
# Mirrors DNS Guard AI's risk_factors.conf shape verbatim
# (Splunkbase 7922, 1st-place AI/ML 2025). 11 rule stanzas — one per
# verbatim Cisco AI Defense rule name — plus a HIGH-severity multiplier
# and a whitelist exclusion.
#
# Per-rule values are tuned for AI-safety domain (40-70 range, vs. DNS
# Guard's flat 50): PHI / PCI / Violence & Public Safety Threats at 70
# because they trigger regulatory escalation. The HIGH-severity
# multiplier (×2) is what produces RBA-priority HIGH scores
# (e.g. PHI base 70 × HIGH 2 = 140, well above ES's 100-pt HIGH bucket).
#
# When ES is not installed, this conf parses cleanly but has no effect —
# README documents ES as an optional dependency.

[Aegis - Code Detection]
conditions = [{"comparator":"equal","field":"rule","value":"Code Detection","value_type":"value"}]
description = Aegis flagged executable code patterns in agent output. SOC priority moderate.
value = 40
disabled = 0

[Aegis - Harassment]
conditions = [{"comparator":"equal","field":"rule","value":"Harassment","value_type":"value"}]
description = Aegis flagged harassing language. SOC priority moderate.
value = 50
disabled = 0

[Aegis - Hate Speech]
conditions = [{"comparator":"equal","field":"rule","value":"Hate Speech","value_type":"value"}]
description = Aegis flagged hate-speech language. SOC priority moderate.
value = 50
disabled = 0

[Aegis - PCI]
conditions = [{"comparator":"equal","field":"rule","value":"PCI","value_type":"value"}]
description = Aegis flagged Payment Card Industry data exposure. Regulatory escalation; PCI-DSS scope.
value = 70
disabled = 0

[Aegis - PHI]
conditions = [{"comparator":"equal","field":"rule","value":"PHI","value_type":"value"}]
description = Aegis flagged Protected Health Information exposure. Regulatory escalation; HIPAA scope.
value = 70
disabled = 0

[Aegis - PII]
conditions = [{"comparator":"equal","field":"rule","value":"PII","value_type":"value"}]
description = Aegis flagged Personally Identifiable Information exposure. SOC priority moderate.
value = 50
disabled = 0

[Aegis - Prompt Injection]
conditions = [{"comparator":"equal","field":"rule","value":"Prompt Injection","value_type":"value"}]
description = Aegis flagged prompt-injection attempt. ATLAS technique ID lifted from atlas_technique_mapping.csv at correlation-search time.
value = 60
disabled = 0

[Aegis - Profanity]
conditions = [{"comparator":"equal","field":"rule","value":"Profanity","value_type":"value"}]
description = Aegis flagged profanity. SOC priority low (UX-quality signal).
value = 20
disabled = 0

[Aegis - Sexual Content & Exploitation]
conditions = [{"comparator":"equal","field":"rule","value":"Sexual Content & Exploitation","value_type":"value"}]
description = Aegis flagged sexual content / exploitation. SOC priority high (safety risk).
value = 60
disabled = 0

[Aegis - Social Division & Polarization]
conditions = [{"comparator":"equal","field":"rule","value":"Social Division & Polarization","value_type":"value"}]
description = Aegis flagged divisive / polarizing content. SOC priority moderate.
value = 40
disabled = 0

[Aegis - Violence & Public Safety Threats]
conditions = [{"comparator":"equal","field":"rule","value":"Violence & Public Safety Threats","value_type":"value"}]
description = Aegis flagged violence or public-safety threat. Regulatory escalation; safety incident path.
value = 70
disabled = 0

[Aegis - HIGH severity multiplier]
conditions = [{"comparator":"equal","field":"severity","value":"HIGH","value_type":"value"}]
description = Doubles risk score when severity is HIGH. PHI 70 x HIGH 2 = 140 > ES HIGH-bucket threshold.
operation_group = mult
value = 2
disabled = 0

[Aegis - Whitelisted agent]
conditions = [{"comparator":"isNotNull","field":"agent_id","value":"aegis_whitelist_agent_lookup","value_type":"lookup"}]
description = Agent is in the aegis_whitelist_agent lookup; risk zeroed. CI smoke agents and known-safe service agents go here.
operation_group = mult
value = 0
disabled = 0
