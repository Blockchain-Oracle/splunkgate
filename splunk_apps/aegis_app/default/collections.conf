######################################
###  Aegis KV-store collections      ###
######################################
#
# Two collections:
#   1. aegis_verdict_history — one row per Verdict event, 7+yr retention
#      eligible. Composite _key = trace_id#timestamp_epoch ensures one
#      row per verdict even if a saved search ingests twice.
#   2. aegis_profile_index — small lookup-style collection mapping the
#      4 jurisdictional profiles to their retention years + applicable
#      regulations. Seeded from lookups/aegis_profile_seed.csv on first
#      install via a one-shot saved search (lives in story-app-03's
#      savedsearches.conf — see PR description).
#
# Field types per Splunk KV-store: string, number, bool, time. No nested
# types — multi-value fields (rules, classifications) are flattened to
# comma-separated strings at insert time (the saved searches in story
# app-03 handle the flattening).

[aegis_verdict_history]
field._key = string
field._user = string
field.last_update = time
field.trace_id = string
field.timestamp = time
field.agent_id = string
field.surface = string
field.verdict_label = string
field.severity = string
field.severity_score = number
field.rules = string
field.classifications = string
# explanation: capped at 4000 chars at insert time by the
# update_verdict_history macro in story-app-03 (Splunk KV-store
# practical limit; longer Foundation-Sec explanations get truncated).
field.explanation = string
field.latency_ms = number
field.jurisdictional_tag = string
field.retention_until = time
# Per pr-review I1: Splunk Cloud has a known silent-init failure on
# whitespace-sensitive JSON parsing of accelerated_fields. Removing
# the spaces matches the form Splunk btool accepts cleanly across
# both Cloud and Enterprise. The index covers the two most common
# Verdict Inspector dashboard joins: trace_id (drill-down) and
# timestamp (range filter).
accelerated_fields.verdict_history_idx = {"trace_id":1,"timestamp":1}

[aegis_profile_index]
field._key = string
field.jurisdictional_tag = string
field.retention_years = number
field.applicable_regs = string
