# SplunkGate × DefenseClaw smoke harness (story-dc-01).
#
# Brings up DefenseClaw against a Splunk HEC double, runs the verifier
# one-shot, and tears down. Use:
#   docker compose up --abort-on-container-exit verifier
# Exit 0 means the config delta routes a verdict to the right sourcetype.

services:

  defenseclaw-gateway:
    # No public Docker image exists for DefenseClaw v0.6.5 — the upstream
    # repo (Apache-2.0) is build-from-source. The operator must clone +
    # `make docker-image` at the pinned commit BEFORE `docker compose up`;
    # this `build:` stanza assumes the resulting image tag.
    # See README.md "Step 1 — Get DefenseClaw".
    image: cisco-ai-defense/defenseclaw:v0.6.5
    pull_policy: never
    container_name: splunkgate-dc-gateway
    environment:
      SPLUNKGATE_SPLUNK_HEC_URL: http://splunk-hec-double:8088
      SPLUNKGATE_SPLUNK_HEC_TOKEN: smoke-test-hec-token
      SPLUNKGATE_SPLUNK_INDEX: smoke
    volumes:
      - ./defenseclaw.yaml:/etc/defenseclaw/defenseclaw.yaml:ro
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8443/healthz"]
      interval: 2s
      timeout: 1s
      retries: 10
    networks:
      - splunkgate-smoke

  splunk-hec-double:
    image: python:3.13-slim
    container_name: splunkgate-hec-double
    working_dir: /app
    command: ["python", "/app/hec_double.py"]
    environment:
      DOUBLE_HEC_PORT: "8088"
      DOUBLE_HEC_EVENTS_PATH: /data/events.jsonl
    volumes:
      - ./hec_double.py:/app/hec_double.py:ro
      - hec-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/services/collector/health')"]
      interval: 2s
      timeout: 1s
      retries: 10
    networks:
      - splunkgate-smoke

  verifier:
    image: python:3.13-slim
    container_name: splunkgate-dc-verifier
    working_dir: /app
    depends_on:
      defenseclaw-gateway:
        condition: service_healthy
      splunk-hec-double:
        condition: service_healthy
    environment:
      DC_GATEWAY_URL: http://defenseclaw-gateway:8443
      DOUBLE_HEC_EVENTS_PATH: /data/events.jsonl
      FLUSH_TIMEOUT_S: "30"
    command: ["python", "/app/verify.py"]
    volumes:
      - ./verify.py:/app/verify.py:ro
      - hec-data:/data
    networks:
      - splunkgate-smoke

volumes:
  hec-data:

networks:
  splunkgate-smoke:
    driver: bridge
