[project]
name = "aegis-mcp"
version = "0.0.1"
description = "Aegis MCP server (Surface 2)"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
dependencies = ["aegis-core", "aegis-judges"]

[tool.uv.sources]
aegis-core = { workspace = true }
aegis-judges = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_mcp"]
