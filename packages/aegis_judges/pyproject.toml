[project]
name = "aegis-judges"
version = "0.0.1"
description = "Aegis multi-judge layer: AI Defense client, DefenseClaw shim, Foundation-Sec explainer"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
dependencies = ["aegis-core"]

[tool.uv.sources]
aegis-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_judges"]
