[project]
name = "aegis-core"
version = "0.0.1"
description = "Aegis core domain types: Verdict, Severity, OTel emission, error model"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
dependencies = ["pydantic>=2.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_core"]
