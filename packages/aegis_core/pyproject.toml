[project]
name = "aegis-core"
version = "0.0.1"
description = "Aegis core domain types: Verdict, Severity, OTel emission, error model"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.10",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "structlog>=24.4",
    "httpx>=0.27",
    "tenacity>=9.0",
    # Note: opentelemetry-util-genai was in the story spec but is not yet
    # imported. Hand-rolled gen_ai.evaluation.* attribute keys gave us full
    # control over the custom score.label values (block/allow/modify/review).
    # Re-add as a dep when a future story switches to its `Evaluation`/`emit`
    # helpers — for now it would be dead weight in the lockfile.
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegis_core"]
