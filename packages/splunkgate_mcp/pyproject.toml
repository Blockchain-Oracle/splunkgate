[project]
name = "splunkgate-mcp"
version = "0.1.0"
description = "SplunkGate MCP server (Surface 2) — runtime AI agent safety net exposed to any MCP client"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
dependencies = [
    "splunkgate-core",
    "splunkgate-judges",
    # Pinned ~=1.27 (compatible-release: >=1.27.0,<2.0) because register_tool
    # depends on FastMCP's private `_tool_manager._tools` shape per PR #115
    # toolkit code-review finding rank-2. Upgrading to 2.x requires verifying
    # the private path still exists or extracting to a public-API path.
    "mcp[cli]~=1.27",
    "pydantic>=2.10",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "structlog>=24.4",
]

[tool.uv.sources]
splunkgate-core = { workspace = true }
splunkgate-judges = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/splunkgate_mcp"]
