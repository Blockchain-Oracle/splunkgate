# SplunkGate gitleaks config — inherits gitleaks default ruleset.
# Adds narrowly-scoped allowlist entries; every entry must reference a
# docs/ file or fixture path with a justification.

title = "SplunkGate gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "SplunkGate-scoped carve-outs for synthetic fixtures and documented env-var names"

# Per docs/cicd-spec.md § "Pre-commit hooks" + story-cicd-04, synthetic
# fixture files under tests/fixtures/ contain intentionally-shaped secrets
# used to verify gitleaks itself fires. Path scoped to fixture dirs only.
paths = [
  '''tests/fixtures/.*''',
]

# Per docs/cicd-spec.md § "Secrets to configure in GitHub", the env-var
# name SPLUNKGATE_AI_DEFENSE_API_KEY appears throughout docs/ as a placeholder
# (not a value). Same for SPLUNKGATE_SPLUNK_HEC_TOKEN, SPLUNKGATE_SPLUNK_API_TOKEN.
# These are NAMES, never set in source.
#
# IMPORTANT: gitleaks' `[allowlist].regexes` matches the DETECTED SECRET
# VALUE, not the surrounding line. A real-shaped slack-token-shaped secret
# co-located on a line containing SPLUNKGATE_AI_DEFENSE_API_KEY will STILL fire.
# Verified empirically. Do not widen these regexes to match line content.
regexes = [
  '''SPLUNKGATE_AI_DEFENSE_API_KEY''',
  '''SPLUNKGATE_SPLUNK_HEC_TOKEN''',
  '''SPLUNKGATE_SPLUNK_API_TOKEN''',
  '''CODECOV_TOKEN''',
  '''GITLEAKS_LICENSE''',
]
