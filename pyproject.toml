[project]
name = "aegis-monorepo"
version = "0.0.1"
description = "Aegis — runtime AI agent safety net for Splunk/Cisco enterprises"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
authors = [{ name = "Aegis contributors" }]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "hypothesis>=6.112",
    "respx>=0.21",
    "ruff>=0.6",
    "mypy>=1.11",
    "pre-commit>=4.0",
    "aegis-core",
    "aegis-judges",
    "aegis-mw",
    "aegis-mcp",
    "aegis-eval",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages", "eval"]
addopts = "--import-mode=importlib"

[tool.uv.sources]
aegis-core = { workspace = true }
aegis-judges = { workspace = true }
aegis-mw = { workspace = true }
aegis-mcp = { workspace = true }
aegis-eval = { workspace = true }

[tool.uv.workspace]
members = [
    "packages/aegis_core",
    "packages/aegis_judges",
    "packages/aegis_mw",
    "packages/aegis_mcp",
    "eval",
]
