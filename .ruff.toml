line-length = 100
target-version = "py313"

[lint]
# Per docs/architecture.md § "Coding standards" hard rule 3: all rules enabled.
select = ["ALL"]
ignore = [
    "E501",     # Line-length deferred to formatter (per spec)
    "D203",     # Conflict with D211 (blank-line-before-class); pick D211
    "D213",     # Conflict with D212 (multi-line-summary-first-line); pick D212
    "COM812",   # Conflicts with ruff's own formatter
    "ISC001",   # Conflicts with ruff's own formatter
]

[lint.per-file-ignores]
# Test files don't need docstrings on every function; assert + magic numbers
# are tester staples; allow subprocess in meta-tests.
"**/tests/**/*.py"   = ["D", "ANN", "S101", "S603", "S607", "PLR2004"]
"tests/**/*.py"      = ["D", "ANN", "S101", "S603", "S607", "PLR2004"]
# Package-level conftest.py needs INP001 carve-out (implicit namespace package).
"**/conftest.py"     = ["INP001"]
# Eval scripts and ops scripts get docstring + magic-number relaxation
# .github/scripts/check_loc.py prints status as part of its CLI contract;
# T201 (no-print) suppressed here only. Use structlog in production code.
".github/scripts/*.py" = ["D", "PLR2004", "TRY003", "T201"]
# Ops scripts under scripts/ are CLI tools, not importable packages — same
# carve-out as .github/scripts/ + INP001 since scripts/ is not a package.
"scripts/*.py"         = ["D", "PLR2004", "TRY003", "T201", "INP001"]
# Per-app scripts mirror the same carve-out: helpers that ship with the
# Splunk app (e.g. splunk_apps/aegis_app/scripts/run_appinspect.sh
# companions) are not importable packages.
"**/aegis_app/scripts/*.py" = ["D", "PLR2004", "TRY003", "T201", "INP001"]
# Per-app tests live under splunk_apps/aegis_app/tests/ — same shape as
# packages/*/tests/ but the existing **/tests/**/*.py rule already
# covers them for D/ANN/S101/S603/S607/PLR2004; INP001 needs an explicit
# add because Splunk apps aren't Python packages.
"**/aegis_app/tests/**/*.py" = ["INP001"]

[lint.pydocstyle]
convention = "google"
