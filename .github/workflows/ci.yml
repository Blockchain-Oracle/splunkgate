name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "latest"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      - run: uv run mypy --strict -p splunkgate_core -p splunkgate_judges
      - run: uv run mypy -p splunkgate_mw -p splunkgate_mcp -p splunkgate_eval

  loc-cap:
    name: 400-LOC cap
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv run python .github/scripts/check_loc.py

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]
    strategy:
      matrix:
        package: [splunkgate_core, splunkgate_judges, splunkgate_mw, splunkgate_mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      - run: uv run pytest packages/${{ matrix.package }} --cov=${{ matrix.package }} --cov-report=xml --cov-fail-under=70
      - uses: codecov/codecov-action@v4
        if: ${{ matrix.package == 'splunkgate_core' || matrix.package == 'splunkgate_judges' }}
        with:
          files: coverage.xml
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  appinspect:
    name: Splunk AppInspect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install libmagic (required by splunk-appinspect → python-magic)
        run: sudo apt-get update && sudo apt-get install -y libmagic1
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run splunk-appinspect inspect splunk_apps/splunkgate_app/ --output-file appinspect-report.json --mode test --included-tags cloud --included-tags self-service --included-tags appapproval
      - uses: actions/upload-artifact@v4
        with:
          name: appinspect-report
          path: appinspect-report.json
      - run: |
          if uv run python .github/scripts/parse_appinspect.py appinspect-report.json; then
            echo "AppInspect passed (no error-severity findings)"
          else
            echo "AppInspect found error-severity issues"; exit 1
          fi

  build-wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    strategy:
      matrix:
        package: [splunkgate_core, splunkgate_judges, splunkgate_mw, splunkgate_mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv build --package ${{ matrix.package }} --out-dir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.package }}
          path: dist/

  build-app:
    name: Build Splunk app .tgz
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [appinspect]
    steps:
      - uses: actions/checkout@v4
      - name: Build .tgz (guarded — splunk_apps/splunkgate_app/ lands in EPIC-09)
        run: |
          mkdir -p dist/
          if [ -d splunk_apps/splunkgate_app ]; then
            tar --exclude='__pycache__' --exclude='*.pyc' --exclude='.appinspect.expect.yaml' \
                -czf dist/splunkgate_app-$(git rev-parse --short HEAD).tgz -C splunk_apps splunkgate_app
            ls -la dist/
          else
            echo "splunk_apps/splunkgate_app/ not present yet (lands in EPIC-09); build-app exits clean as a placeholder."
          fi
      - uses: actions/upload-artifact@v4
        if: hashFiles('dist/*.tgz') != ''
        with:
          name: splunk-app-tgz
          path: dist/*.tgz
