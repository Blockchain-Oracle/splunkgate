name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "latest"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      - run: uv run mypy --strict -p aegis_core -p aegis_judges
      - run: uv run mypy -p aegis_mw -p aegis_mcp -p aegis_eval

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]
    strategy:
      matrix:
        package: [aegis_core, aegis_judges, aegis_mw, aegis_mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      - run: uv run pytest packages/${{ matrix.package }} --cov=${{ matrix.package }} --cov-report=xml --cov-fail-under=70
      - uses: codecov/codecov-action@v4
        if: ${{ matrix.package == 'aegis_core' || matrix.package == 'aegis_judges' }}
        with:
          files: coverage.xml
          flags: ${{ matrix.package }}
          fail_ci_if_error: false

  build-wheels:
    name: Build wheels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    strategy:
      matrix:
        package: [aegis_core, aegis_judges, aegis_mw, aegis_mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv build --package ${{ matrix.package }} --out-dir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.package }}
          path: dist/

  build-app:
    name: Build Splunk app .tgz
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Build .tgz (guarded — splunk_apps/aegis_app/ lands in EPIC-09)
        run: |
          mkdir -p dist/
          if [ -d splunk_apps/aegis_app ]; then
            tar --exclude='__pycache__' --exclude='*.pyc' --exclude='.appinspect.expect.yaml' \
                -czf dist/aegis_app-$(git rev-parse --short HEAD).tgz -C splunk_apps aegis_app
            ls -la dist/
          else
            echo "splunk_apps/aegis_app/ not present yet (lands in EPIC-09); build-app exits clean as a placeholder."
          fi
      - uses: actions/upload-artifact@v4
        if: hashFiles('dist/*.tgz') != ''
        with:
          name: splunk-app-tgz
          path: dist/*.tgz
