name: Security
on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "latest"

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --frozen
      # --skip-editable: workspace-local packages (splunkgate_core, splunkgate_judges, ...)
      # aren't on PyPI so pip-audit can't query for CVEs against them. Their
      # actual content is gated by ruff/mypy/bandit; pip-audit's value here is
      # transitive PyPI deps (pytest, httpx, structlog, ...).
      # --strict dropped: pip-audit treats every --skip-editable result as an
      # error under --strict (incompatible with uv workspace layouts). Without
      # --strict, vulns still fail the run; only Skip-rows are non-fatal.
      #
      # --ignore-vuln PYSEC-2026-87: lxml<6.1.0 XXE — fix only in lxml 6.x.
      # `splunk-appinspect==4.2.1` pins `lxml<6.0.0,>=5.3.0`, so we cannot
      # bump lxml without bumping AppInspect (no release after 4.2.1 exists).
      # SplunkGate code does NOT use lxml directly; the only consumer is
      # `splunk-appinspect` itself, running in CI against our OWN app source
      # under our control. The XXE path requires an attacker to inject
      # malicious XML into splunk_apps/splunkgate_app/ — which would already
      # be caught at PR review. Acceptable risk; lift when AppInspect ships
      # a release with lxml>=6.1.0.
      #
      # Tripwire (per silent-failure-hunter on PR #122 follow-up): the
      # ignore above is workflow-global. If a future story adds lxml as a
      # direct production dep, the CVE silently disappears. This step fails
      # the run if `lxml` is reachable from any package other than
      # `splunk-appinspect` — forcing a deliberate re-evaluation of the
      # ignore scope when the dep tree changes.
      - name: Tripwire — fail if lxml leaks beyond splunk-appinspect
        run: |
          set -euo pipefail
          # `uv pip show lxml` lists which packages require lxml. We expect
          # exactly one reverse-dep: splunk-appinspect. Any additional
          # reverse-dep means the workflow-global PYSEC-2026-87 ignore is
          # broader than intended.
          required_by=$(uv pip show lxml 2>/dev/null | awk -F': ' '/^Required-by:/ {print $2}' | tr ',' '\n' | sed 's/[[:space:]]*//g' | sort -u | grep -v '^$' || true)
          echo "lxml reverse-deps: ${required_by:-<none>}"
          unexpected=$(echo "$required_by" | grep -v '^splunk-appinspect$' || true)
          if [ -n "$unexpected" ]; then
            echo "::error::lxml is now a transitive dep of: $unexpected"
            echo "::error::The PYSEC-2026-87 ignore was scoped to splunk-appinspect only."
            echo "::error::Re-evaluate the ignore scope or remove the leaked dep before merge."
            exit 1
          fi
      - run: uv run --with pip-audit pip-audit --skip-editable --ignore-vuln PYSEC-2026-87

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  bandit:
    name: bandit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv run --with bandit bandit -r packages/splunkgate_judges/src/ -c .bandit
