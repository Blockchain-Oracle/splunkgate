repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # v0.15.15 — matches the ruff version resolved by the workspace dev-group
    # (uv resolves `ruff>=0.6` to 0.15.15 as of 2026-06-03). Version drift
    # between hook + dev-group causes silent format-style flapping; keep
    # these aligned via skel-02 once it owns the canonical ruff pin.
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Local mypy hook (NOT mirrors-mypy) so it runs in the uv venv where
  # workspace packages (splunkgate_core, splunkgate_judges) are editable-installed.
  # mirrors-mypy's hermetic env can't resolve workspace deps.
  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (splunkgate_core + splunkgate_judges)
        entry: uv run mypy --strict -p splunkgate_core -p splunkgate_judges
        language: system
        pass_filenames: false
        files: ^packages/(splunkgate_core|splunkgate_judges)/src/.*\.py$

  - repo: local
    hooks:
      - id: check-loc-400
        name: 400-LOC cap
        entry: uv run python .github/scripts/check_loc.py
        language: system
        pass_filenames: false
        types: [python]

      - id: no-print
        name: No print() in production
        entry: bash -c 'if grep -rn "print(" packages/splunkgate_*/src/ --include="*.py" | grep -v "structlog\|test\|_mock\.py"; then echo "Use structlog, not print()"; exit 1; fi'
        language: system
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
